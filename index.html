<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tìm thuê căn hộ Vinhomes Smart City</title>
  <meta name="description" content="Danh sách căn hộ cho thuê Vinhomes Smart City được cập nhật từ dữ liệu thực tế. Lọc theo loại căn, giá thuê và tình trạng vào ở.">
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #111827;
      --muted: #667085;
      --line: #e5e7eb;
      --brand: #2563eb;
      --brand-dark: #1e3a8a;
      --ok: #059669;
      --warn: #f59e0b;
      --shadow: 0 18px 45px rgba(15, 23, 42, .08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }

    .shell {
      width: min(1220px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      min-height: 72px;
      display: grid;
      grid-template-columns: auto minmax(220px, 460px) auto;
      align-items: center;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #0f766e);
      color: #fff;
    }

    .brand small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
    }

    .search {
      position: relative;
    }

    .search svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #98a2b3;
    }

    .search input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 16px 0 42px;
      outline: none;
      background: #fff;
    }

    .search input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
    }

    .pill-btn {
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 18px;
      background: #fff;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .pill-btn.primary {
      border-color: transparent;
      background: var(--brand);
      color: #fff;
    }

    .hero {
      background:
        linear-gradient(110deg, rgba(12, 28, 73, .96), rgba(30, 64, 175, .82)),
        radial-gradient(circle at 82% 20%, rgba(20, 184, 166, .25), transparent 34%);
      color: #fff;
    }

    .hero-inner {
      min-height: 210px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 28px;
      padding: 40px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 620px;
      margin: 14px 0 0;
      color: rgba(255,255,255,.78);
      font-size: 16px;
      line-height: 1.65;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 1px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius);
      background: rgba(255,255,255,.14);
      box-shadow: var(--shadow);
    }

    .stat {
      min-width: 130px;
      padding: 24px 28px;
      text-align: center;
      background: rgba(255,255,255,.08);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: rgba(255,255,255,.68);
      font-size: 12px;
      text-transform: uppercase;
    }

    .filters {
      margin-top: 24px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 10px 30px rgba(15, 23, 42, .05);
    }

    .filter-group + .filter-group {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #eef2f7;
    }

    .filter-label {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 16px;
      background: #fff;
      color: #1f2937;
      font-weight: 700;
      cursor: pointer;
    }

    .chip.active {
      border-color: #111827;
      background: #111827;
      color: #fff;
    }

    main {
      padding: 24px 0 64px;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 24px 0 16px;
    }

    .result-count {
      color: var(--muted);
    }

    .result-count strong { color: var(--ink); }

    select {
      height: 40px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 0 12px;
      color: #111827;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 12px 30px rgba(15, 23, 42, .06);
    }

    .media {
      position: relative;
      aspect-ratio: 4 / 3;
      background: #dbeafe;
    }

    .media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .media.empty {
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, #1d4ed8, #2563eb 58%, #0f766e);
      color: #fff;
      text-align: center;
      font-weight: 800;
      letter-spacing: .04em;
      font-size: 12px;
    }

    .badge {
      position: absolute;
      left: 14px;
      top: 14px;
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(5, 150, 105, .95);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .badge.date {
      background: rgba(245, 158, 11, .95);
    }

    .body {
      padding: 16px;
    }

    .tower {
      display: inline-flex;
      margin-bottom: 10px;
      border-radius: 6px;
      padding: 4px 8px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.25;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tag {
      border-radius: 6px;
      padding: 5px 8px;
      background: #f3f4f6;
      color: #4b5563;
      font-size: 12px;
      font-weight: 700;
    }

    .tag.furnished {
      background: #ede9fe;
      color: #6d28d9;
    }

    .available {
      display: flex;
      gap: 6px;
      align-items: center;
      min-height: 36px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid #eef2f7;
    }

    .price {
      font-size: 20px;
      font-weight: 900;
    }

    .price small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .ask {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 108px;
      height: 38px;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--brand);
      font-weight: 800;
      font-size: 13px;
    }

    .empty-state, .error-state {
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius);
      padding: 34px;
      background: #fff;
      color: var(--muted);
      text-align: center;
    }

    .floating-zalo {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 25;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 18px 34px rgba(37, 99, 235, .35);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(15, 23, 42, .74);
      padding: 28px;
    }

    .modal.open {
      display: grid;
      place-items: center;
    }

    .modal-panel {
      width: min(980px, 100%);
      max-height: min(820px, calc(100vh - 56px));
      overflow: auto;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .modal-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
    }

    .close {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      background: #f3f4f6;
      cursor: pointer;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding: 18px;
    }

    .gallery img, .gallery video {
      width: 100%;
      max-height: 74vh;
      border-radius: 8px;
      background: #111827;
      object-fit: contain;
    }

    @media (max-width: 980px) {
      .nav { grid-template-columns: 1fr auto; }
      .search { grid-column: 1 / -1; grid-row: 2; padding-bottom: 14px; }
      .hero-inner { grid-template-columns: 1fr; }
      .stats { width: min(360px, 100%); }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 640px) {
      .shell { width: min(100% - 28px, 1220px); }
      .nav {
        min-height: 84px;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      .brand { gap: 9px; }
      .brand small { font-size: 11px; }
      .actions { gap: 8px; }
      .pill-btn { width: 46px; padding: 0; }
      .pill-btn span { display: none; }
      .hero-inner { padding: 34px 0; }
      .filters { padding: 18px; }
      .chip { min-height: 38px; padding: 0 13px; }
      .list-head { align-items: stretch; flex-direction: column; }
      .grid { grid-template-columns: 1fr; gap: 18px; }
      .gallery { grid-template-columns: 1fr; }
      .floating-zalo { right: 18px; bottom: 18px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell nav">
      <a class="brand" href="#">
        <span class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M3 10.8 12 3l9 7.8v9.7a.5.5 0 0 1-.5.5h-5.2v-6.1H8.7V21H3.5a.5.5 0 0 1-.5-.5v-9.7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </span>
        <span>SmartCity Housing<small>Premium Finder</small></span>
      </a>

      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="m21 21-4.35-4.35M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="search" placeholder="Nhập tòa, loại căn, diện tích để tìm nhanh...">
      </div>

      <div class="actions">
        <a class="pill-btn" href="tel:0977923284" aria-label="Gọi hotline">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M22 16.92v2.7a1.8 1.8 0 0 1-1.96 1.8A17.8 17.8 0 0 1 12.3 18.67a17.5 17.5 0 0 1-5.4-5.4A17.8 17.8 0 0 1 4.15 5.5 1.8 1.8 0 0 1 5.94 3.5h2.7a1.8 1.8 0 0 1 1.8 1.55c.11.86.3 1.7.58 2.5a1.8 1.8 0 0 1-.4 1.9L9.48 10.6a14.4 14.4 0 0 0 5.4 5.4l1.16-1.15a1.8 1.8 0 0 1 1.9-.4c.8.28 1.64.47 2.5.58A1.8 1.8 0 0 1 22 16.92Z" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>Hotline</span>
        </a>
        <a class="pill-btn primary" href="https://zalo.me/0977923284" target="_blank" rel="noopener" aria-label="Nhắn Zalo">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.3 9.5 9.5 0 0 1-3.5-.67L3 21l1.9-5.1a8 8 0 0 1-.9-3.7A8.4 8.4 0 0 1 12.5 4 8.4 8.4 0 0 1 21 11.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
          <span>Nhắn Zalo</span>
        </a>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="shell hero-inner">
      <div>
        <h1>Căn hộ Vinhomes Smart City</h1>
        <p>Cập nhật căn trống theo dữ liệu thực tế. Lọc nhanh theo loại căn, khoảng giá và tình trạng vào ở để chọn căn phù hợp.</p>
      </div>
      <div class="stats" aria-label="Tổng quan căn hộ">
        <div class="stat"><strong id="totalCount">--</strong><span>Tổng căn</span></div>
        <div class="stat"><strong id="readyCount">--</strong><span>Ở ngay</span></div>
      </div>
    </div>
  </section>

  <main class="shell">
    <section class="filters" aria-label="Bộ lọc căn hộ">
      <div class="filter-group">
        <div class="filter-label">Cấu trúc phòng ngủ</div>
        <div class="chips" id="typeFilters"></div>
      </div>
      <div class="filter-group">
        <div class="filter-label">Khoảng giá thuê tháng</div>
        <div class="chips" id="priceFilters"></div>
      </div>
    </section>

    <div class="list-head">
      <div class="result-count" id="resultCount">Đang tải dữ liệu...</div>
      <select id="sortSelect" aria-label="Sắp xếp căn hộ">
        <option value="price-asc">Giá: Thấp đến Cao</option>
        <option value="price-desc">Giá: Cao đến Thấp</option>
        <option value="area-desc">Diện tích: Lớn nhất</option>
      </select>
    </div>

    <section class="grid" id="listingGrid" aria-live="polite"></section>
  </main>

  <a class="floating-zalo" href="https://zalo.me/0977923284" target="_blank" rel="noopener" aria-label="Chat Zalo">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M21 11.5a8.4 8.4 0 0 1-8.5 8.3 9.5 9.5 0 0 1-3.5-.67L3 21l1.9-5.1a8 8 0 0 1-.9-3.7A8.4 8.4 0 0 1 12.5 4 8.4 8.4 0 0 1 21 11.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </svg>
  </a>

  <div class="modal" id="galleryModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-panel">
      <div class="modal-head">
        <strong id="modalTitle">Hình ảnh căn hộ</strong>
        <button class="close" id="closeModal" type="button" aria-label="Đóng">×</button>
      </div>
      <div class="gallery" id="galleryContent"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      dataEndpoint: "https://script.google.com/macros/s/AKfycbwn_jZuzhcolEIHpxHt5TlZKyjrXsyU4nCQ9FPj4lJN/dev",
      zaloPhone: "0977923284",
      fallbackSheetId: "1BBnB5PPLR3HZWHqsa5qvvtgWvFMiHNE2ZMIlUSXcKZk",
      fallbackGid: "0",
      allowUnsafeSheetPreview: false
    };

    const state = {
      apartments: [],
      type: "all",
      price: "all",
      query: "",
      sort: "price-asc"
    };

    const typeFilters = [
      { key: "all", label: "Tất cả phòng" },
      { key: "studio", label: "Studio" },
      { key: "1 ngủ", label: "1 phòng ngủ" },
      { key: "1 ngủ +", label: "1 phòng ngủ +" },
      { key: "2 ngủ", label: "2 phòng ngủ" },
      { key: "2 ngủ +", label: "2 phòng ngủ +" },
      { key: "3 ngủ", label: "3 phòng ngủ" }
    ];

    const priceFilters = [
      { key: "all", label: "Tất cả mức giá", test: () => true },
      { key: "under8", label: "Dưới 8 triệu", test: price => price < 8000000 },
      { key: "8to10", label: "8 - 10 triệu", test: price => price >= 8000000 && price <= 10000000 },
      { key: "10to12", label: "10 - 12 triệu", test: price => price > 10000000 && price <= 12000000 },
      { key: "12to15", label: "12 - 15 triệu", test: price => price > 12000000 && price <= 15000000 },
      { key: "over15", label: "Trên 15 triệu", test: price => price > 15000000 }
    ];

    const $ = selector => document.querySelector(selector);

    function normalizeText(value) {
      return String(value || "").trim();
    }

    function normalizeKey(value) {
      return normalizeText(value).toLowerCase();
    }

    function parseMoney(value) {
      if (typeof value === "number") return value;
      const cleaned = normalizeText(value).replace(/[^\d]/g, "");
      return Number(cleaned || 0);
    }

    function parseArea(value) {
      if (typeof value === "number") return value;
      const cleaned = normalizeText(value).replace(",", ".").replace(/[^\d.]/g, "");
      return Number(cleaned || 0);
    }

    function splitLinks(value) {
      if (Array.isArray(value)) return value.filter(Boolean);
      return normalizeText(value)
        .split(/[\n,;]+/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function driveUrlToViewUrl(url) {
      const text = normalizeText(url);
      if (!text) return "";
      const fileMatch = text.match(/\/file\/d\/([^/]+)/) || text.match(/[?&]id=([^&]+)/);
      if (fileMatch) return `https://drive.google.com/uc?export=view&id=${fileMatch[1]}`;
      return text;
    }

    function isConfiguredEndpoint() {
      return CONFIG.dataEndpoint && !CONFIG.dataEndpoint.includes("PASTE_");
    }

    function loadJsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `smartCityCallback_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        const separator = url.includes("?") ? "&" : "?";
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Không tải được dữ liệu từ endpoint."));
        }, 20000);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = payload => {
          cleanup();
          resolve(Array.isArray(payload) ? payload : payload.items || []);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Endpoint dữ liệu chưa sẵn sàng."));
        };

        script.src = `${url}${separator}callback=${encodeURIComponent(callbackName)}`;
        document.head.appendChild(script);
      });
    }

    async function loadData() {
      if (isConfiguredEndpoint()) {
        return loadJsonp(CONFIG.dataEndpoint);
      }

      if (!CONFIG.allowUnsafeSheetPreview) {
        throw new Error("Chưa cấu hình Apps Script endpoint. Cần endpoint để web chỉ nhận dữ liệu public và không lộ cột nội bộ.");
      }

      const url = `https://docs.google.com/spreadsheets/d/${CONFIG.fallbackSheetId}/gviz/tq?tqx=out:json&gid=${CONFIG.fallbackGid}`;
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error("Không tải được Google Sheet.");
      const raw = await response.text();
      const json = JSON.parse(raw.substring(raw.indexOf("{"), raw.lastIndexOf("}") + 1));
      const headers = json.table.cols.map(col => normalizeText(col.label));
      return json.table.rows.map(row => {
        const record = {};
        headers.forEach((header, index) => {
          record[header] = row.c[index] ? row.c[index].v : "";
        });
        return record;
      });
    }

    function toApartment(row) {
      const visible = normalizeKey(row["Hiển thị trên Web"] || row["Hiển thị trên web"] || row["Hiển thị"]);
      const status = normalizeText(row["Trạng thái căn"] || row["Trạng thái"]);
      const tower = normalizeText(row["Tòa"]);
      const type = normalizeText(row["Loại"]);
      const area = parseArea(row["Diện tích"]);
      const interior = normalizeText(row["Nội thất"]);
      const price = parseMoney(row["Giá thuê"]);
      const availableDate = normalizeText(row["Ngày vào ở"] || row["Ngày trống"]);
      const cover = driveUrlToViewUrl(row["Ảnh đại diện"]);
      const photos = splitLinks(row["Danh sách ảnh"]).map(driveUrlToViewUrl);
      const videos = splitLinks(row["Video"] || row["Danh sách video"]).map(driveUrlToViewUrl);

      return {
        tower,
        type,
        area,
        interior,
        price,
        availableDate,
        status,
        show: visible === "có" || visible === "co" || visible === "yes" || visible === "true",
        cover: cover || photos[0] || "",
        photos,
        videos
      };
    }

    function formatPrice(price) {
      if (!price) return "Liên hệ";
      if (price % 1000000 === 0) return `${price / 1000000} triệu`;
      return `${(price / 1000000).toFixed(1).replace(".", ",")} triệu`;
    }

    function availabilityText(apartment) {
      const date = normalizeText(apartment.availableDate);
      if (!date) return "Liên hệ để xem lịch vào ở";
      if (["luôn", "ở ngay", "o ngay", "ngay"].includes(normalizeKey(date))) return "Sẵn sàng dọn vào ở ngay";
      return `Trống lịch xem từ ${date}`;
    }

    function zaloLink(apartment) {
      const text = `Tôi muốn hỏi thuê căn hộ ${apartment.type} tòa ${apartment.tower}, diện tích ${apartment.area || ""}m2, giá ${formatPrice(apartment.price)}/tháng`;
      return `https://zalo.me/${CONFIG.zaloPhone}?text=${encodeURIComponent(text)}`;
    }

    function apartmentMatchesType(apartment) {
      if (state.type === "all") return true;
      return normalizeKey(apartment.type).includes(state.type);
    }

    function apartmentMatchesPrice(apartment) {
      const filter = priceFilters.find(item => item.key === state.price);
      return filter ? filter.test(apartment.price) : true;
    }

    function apartmentMatchesQuery(apartment) {
      if (!state.query) return true;
      const haystack = [
        apartment.tower,
        apartment.type,
        apartment.area,
        apartment.interior,
        apartment.availableDate,
        apartment.price
      ].join(" ").toLowerCase();
      return haystack.includes(state.query);
    }

    function getFilteredApartments() {
      return state.apartments
        .filter(apartment => apartment.show)
        .filter(apartment => apartment.tower && apartment.type && apartment.price)
        .filter(apartmentMatchesType)
        .filter(apartmentMatchesPrice)
        .filter(apartmentMatchesQuery)
        .sort((a, b) => {
          if (state.sort === "price-desc") return b.price - a.price;
          if (state.sort === "area-desc") return b.area - a.area;
          return a.price - b.price;
        });
    }

    function renderFilters() {
      const publicApartments = state.apartments.filter(item => item.show && item.tower && item.type);

      $("#typeFilters").innerHTML = typeFilters.map(filter => {
        const count = filter.key === "all"
          ? publicApartments.length
          : publicApartments.filter(apartment => normalizeKey(apartment.type).includes(filter.key)).length;
        return `<button class="chip ${state.type === filter.key ? "active" : ""}" data-type="${filter.key}" type="button">${filter.label} <small>${count}</small></button>`;
      }).join("");

      $("#priceFilters").innerHTML = priceFilters.map(filter => {
        return `<button class="chip ${state.price === filter.key ? "active" : ""}" data-price="${filter.key}" type="button">${filter.label}</button>`;
      }).join("");

      $("#typeFilters").querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.type = button.dataset.type;
          render();
        });
      });

      $("#priceFilters").querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          state.price = button.dataset.price;
          render();
        });
      });
    }

    function mediaMarkup(apartment, index) {
      const badgeClass = availabilityText(apartment).includes("ngay") ? "" : "date";
      const badgeText = availabilityText(apartment).includes("ngay") ? "Vào ngay" : apartment.availableDate;
      if (!apartment.cover) {
        return `<button class="media empty" type="button" data-gallery="${index}">
          <span class="badge ${badgeClass}">${badgeText}</span>
          <span>VINHOMES SMART CITY</span>
        </button>`;
      }
      return `<button class="media" type="button" data-gallery="${index}" aria-label="Xem ảnh căn hộ ${apartment.tower}">
        <span class="badge ${badgeClass}">${badgeText}</span>
        <img src="${apartment.cover}" alt="Căn hộ ${apartment.type} tòa ${apartment.tower}" loading="lazy" onerror="this.closest('.media').classList.add('empty'); this.remove();">
      </button>`;
    }

    function renderCards(apartments) {
      const grid = $("#listingGrid");
      if (!apartments.length) {
        grid.className = "";
        grid.innerHTML = `<div class="empty-state">Chưa có căn hộ phù hợp với bộ lọc hiện tại.</div>`;
        return;
      }

      grid.className = "grid";
      grid.innerHTML = apartments.map((apartment, index) => `
        <article class="card">
          ${mediaMarkup(apartment, index)}
          <div class="body">
            <span class="tower">${apartment.tower}</span>
            <h3>${apartment.type}</h3>
            <div class="meta">
              <span class="tag">${apartment.area ? apartment.area + " m²" : "Đang cập nhật"}</span>
              <span class="tag furnished">${apartment.interior || "Nội thất cập nhật"}</span>
            </div>
            <div class="available">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 8v5l3 2M21 12A9 9 0 1 1 3 12a9 9 0 0 1 18 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              ${availabilityText(apartment)}
            </div>
            <div class="card-foot">
              <div class="price">${formatPrice(apartment.price)}<small>/tháng</small></div>
              <a class="ask" href="${zaloLink(apartment)}" target="_blank" rel="noopener">Hỏi căn này</a>
            </div>
          </div>
        </article>
      `).join("");

      grid.querySelectorAll("[data-gallery]").forEach(button => {
        button.addEventListener("click", () => openGallery(apartments[Number(button.dataset.gallery)]));
      });
    }

    function openGallery(apartment) {
      const media = [...apartment.photos, ...apartment.videos];
      $("#modalTitle").textContent = `${apartment.type} - ${apartment.tower}`;
      $("#galleryContent").innerHTML = media.length
        ? media.map(url => {
          const isVideo = /\.(mp4|mov|m4v|webm)(\?|$)/i.test(url);
          return isVideo
            ? `<video src="${url}" controls playsinline></video>`
            : `<img src="${url}" alt="Hình ảnh căn hộ ${apartment.tower}" loading="lazy">`;
        }).join("")
        : `<div class="empty-state">Căn này chưa có album ảnh chi tiết.</div>`;
      $("#galleryModal").classList.add("open");
    }

    function renderStats() {
      const publicApartments = state.apartments.filter(item => item.show && item.tower && item.type && item.price);
      const ready = publicApartments.filter(item => availabilityText(item).includes("ngay")).length;
      $("#totalCount").textContent = publicApartments.length;
      $("#readyCount").textContent = ready;
    }

    function render() {
      renderStats();
      renderFilters();
      const apartments = getFilteredApartments();
      $("#resultCount").innerHTML = `<strong>${apartments.length}</strong> căn hộ đang trống phù hợp`;
      renderCards(apartments);
    }

    async function init() {
      try {
        const rows = await loadData();
        state.apartments = rows.map(toApartment);
        render();
        if (!isConfiguredEndpoint() && CONFIG.allowUnsafeSheetPreview) {
          console.warn("Đang đọc trực tiếp Google Sheet. Để ẩn tuyệt đối cột nội bộ, hãy dùng Apps Script endpoint trong CONFIG.dataEndpoint.");
        }
      } catch (error) {
        $("#resultCount").textContent = "Không tải được dữ liệu";
        $("#listingGrid").className = "";
        $("#listingGrid").innerHTML = `<div class="error-state">${error.message}</div>`;
      }
    }

    $("#searchInput").addEventListener("input", event => {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    $("#sortSelect").addEventListener("change", event => {
      state.sort = event.target.value;
      render();
    });

    $("#closeModal").addEventListener("click", () => $("#galleryModal").classList.remove("open"));
    $("#galleryModal").addEventListener("click", event => {
      if (event.target.id === "galleryModal") $("#galleryModal").classList.remove("open");
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") $("#galleryModal").classList.remove("open");
    });

    init();
  </script>
</body>
</html>
