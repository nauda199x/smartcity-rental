<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý & Đặt Căn Hộ Cao Cấp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo-text">Premium Rentals</h1>
        </div>
    </header>

    <main>
        <div id="apartments-grid"></div>
    </main>

    <!-- Gallery Modal -->
    <div id="gallery-modal" class="gallery-modal">
        <div class="gallery-header">
            <div id="gallery-counter" class="gallery-counter">1 / 1</div>
            <div class="gallery-controls">
                <button id="btn-zoom" class="ctrl-btn" title="Phóng to">🔍 1x</button>
                <button id="btn-fullscreen" class="ctrl-btn" title="Toàn màn hình">🔳</button>
                <button id="btn-close-gallery" class="ctrl-btn" title="Đóng">✕</button>
            </div>
        </div>
        
        <div class="gallery-stage">
            <button id="gallery-prev" class="nav-btn prev">‹</button>
            <div id="main-img-wrapper" class="main-img-wrapper">
                <img id="gallery-main-img" src="" alt="View ảnh lớn">
            </div>
            <button id="gallery-next" class="nav-btn next">›</button>
        </div>

        <div id="gallery-footer" class="gallery-footer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
